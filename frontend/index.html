<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker 💰</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app" class="container">
        <header>
            <div class="header-main">
                <div class="app-title">
                    <h1>💰 Budget Tracker</h1>
                    <p>Track your finances with ease</p>
                </div>
                <div class="header-right">
                    <div class="search-bar" id="header-search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="transaction-search" placeholder="Search transactions...">
                    </div>
                    <div class="filter-btns" id="header-filters-container">
                        <button class="filter-btn" id="advanced-filter-btn">
                            <span>Filters</span>
                            <span>⚙️</span>
                        </button>
                        <button class="filter-btn" id="group-by-btn">
                            <span>Group By: None</span>
                            <span>▼</span>
                        </button>
                        <button class="filter-btn" id="sort-btn">
                            <span>Sort: Date ↓</span>
                            <span>▼</span>
                        </button>
                    </div>
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">🌓</button>
                </div>
            </div>
            <nav class="nav-tabs">
                <button class="active" data-tab="transactions">Transactions</button>
                <button data-tab="budgets">Budgets</button>
                <button data-tab="reports">Reports</button>
                <button data-tab="settings">Settings</button>
            </nav>
        </header>



        <div class="filter-section">
            <div class="time-nav-container">
                <button class="nav-btn" id="prev-period" title="Previous Period">◀</button>
                <button class="filter-btn main-time-btn" id="time-filter-btn">
                    <span>This Month</span>
                </button>
                <button class="nav-btn" id="next-period" title="Next Period">▶</button>
            </div>
        </div>

        <main id="main-content">
            <!-- Dynamic content will be loaded here -->
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
