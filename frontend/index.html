<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker 💰</title>
    <link rel="stylesheet" href="./src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="app" class="container">
        <header>
            <div class="header-main">
                <div class="header-left">
                    <button id="hamburger-menu-btn" class="filter-btn" title="Menu">
                        <span class="icon">☰</span>
                    </button>
                    <div class="app-title">
                        <h1>💰 Budget Tracker</h1>
                        <p>Track your finances with ease</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-container" id="header-search-container">
                        <button id="search-toggle-btn" class="icon-btn" title="Search">🔍</button>
                        <div class="search-input-wrapper">
                            <input type="text" id="transaction-search" placeholder="Search transactions...">
                        </div>
                    </div>
                    <div class="filter-btns" id="header-filters-container">
                        <button class="filter-btn" id="advanced-filter-btn" title="Filters">
                            <span class="icon">▽</span>
                            <span class="badge" id="filter-badge" style="display: none">0</span>
                        </button>
                        <button class="filter-btn" id="group-by-btn" title="Group By">
                            <span class="icon">📂</span>
                            <span class="badge" id="group-badge" style="display: none">0</span>
                        </button>
                        <button class="filter-btn" id="sort-btn" title="Sort">
                            <span class="icon">↕️</span>
                            <span class="badge" id="sort-badge" style="display: none">0</span>
                        </button>
                    </div>
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">🌓</button>
                </div>
        </header>

        <div id="side-nav-overlay" class="side-nav-overlay"></div>
        <nav id="side-nav" class="side-nav">
            <div class="side-nav-header">
                <h2>Navigation</h2>
                <button id="close-side-nav" class="icon-btn">✕</button>
            </div>
            <div class="side-nav-links">
                <button data-tab="transactions" class="side-nav-link active">
                    <span class="icon">💸</span> Transactions
                </button>
                <button data-tab="budgets" class="side-nav-link">
                    <span class="icon">📊</span> Budgets
                </button>
                <button data-tab="reports" class="side-nav-link">
                    <span class="icon">📅</span> Reports
                </button>
                <button id="side-nav-settings-btn" class="side-nav-link">
                    <span class="icon">⚙️</span> Settings
                </button>
            </div>
        </nav>



        <div class="filter-section">
            <div class="time-nav-container">
                <button class="nav-btn" id="prev-period" title="Previous Period">◀</button>
                <button class="filter-btn main-time-btn" id="time-filter-btn">
                    <span>This Month</span>
                </button>
                <button class="nav-btn" id="next-period" title="Next Period">▶</button>
            </div>
        </div>

        <main id="main-content">
            <!-- Dynamic content will be loaded here -->
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
